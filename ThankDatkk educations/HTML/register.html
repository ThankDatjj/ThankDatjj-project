<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - ThankDatjj Education</title>
    
    <!-- Google Fonts: Orbitron cho banner + Roboto cho nội dung -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Liên kết CSS - giả sử dùng chung styles.css với trang login -->
    <link rel="stylesheet" href="/CSS/style.css">
    <!-- Nếu bạn muốn file CSS riêng cho register, dùng: href="register.css" -->
</head>
<body>

    <!-- Banner/Header giống hệt trang login -->
    <header class="header">
        <div class="header-content">
            <div class="logo-text">
                <h1 class="main-title">ThankDatjj Education</h1>
                <p class="subtitle">Nền tảng học tập công nghệ dành cho sinh viên IT</p>
            </div>
            
            <div class="logo-image">
                <img 
                    src="/assets/images/logo.png" 
                    alt="ThankDatjj Education Logo" 
                    class="logo-img"
                    width="180" 
                    height="auto">
            </div>
        </div>
    </header>

    <!-- Phần nội dung chính: Form đăng ký -->
    <main class="login-container">  <!-- dùng class login-container để tái sử dụng style -->
        <div class="login-form">    <!-- dùng class login-form để tái sử dụng style -->
            <h2>Đăng Ký Tài Khoản</h2>
            <form action="/register" method="POST">
                <div class="form-group">
                    <label for="fullname">Họ và tên</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Nhập họ và tên đầy đủ" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required>
                </div>
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Chọn tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu (ít nhất 6 ký tự)" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Xác nhận mật khẩu</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Nhập lại mật khẩu" required>
                </div>
                <button type="submit" class="btn-primary">Đăng Ký</button>
            </form>
            <p class="register-link">Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
        </div>
    </main>

    <!-- Footer giống hệt -->
    <footer class="footer">
        <p>&copy; 2026 ThankDatjj Education. All rights reserved.</p>
    </footer>

</body>
</html>
