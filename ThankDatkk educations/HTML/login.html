<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - ThankDatjj Education</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Sửa đường dẫn CSS - giả sử menu.css cùng thư mục -->
    <link rel="stylesheet" href="/CSS/style.css">
    <!-- Nếu trong thư mục CSS/ thì dùng: <link rel="stylesheet" href="./CSS/menu.css"> -->
</head>
<body>

    <header class="header">
        <div class="header-content">
            <div class="logo-text">
                <h1 class="main-title">ThankDatjj Education</h1>
                <p class="subtitle">Nền tảng học tập công nghệ dành cho sinh viên IT</p>
            </div>
            
            <div class="logo-image">
                <img src="/assets/images/logo.png" alt="ThankDatjj Education Logo" class="logo-img" width="180" height="auto">
                <a href=""></a>
            </div>
        </div>
    </header>

    <main class="login-container">
        <div class="login-form">
            <h2>Đăng Nhập</h2>
            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Tên đăng nhập hoặc Email</label>
                    <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập hoặc email" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="btn-primary">Đăng Nhập</button>
            </form>
            <p class="register-link">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 ThankDatjj Education. All rights reserved.</p>
    </footer>

</body>
<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault(); // Ngăn submit mặc định

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        // Demo: kiểm tra cứng (không an toàn, chỉ test)
        if (username === 'admin' && password === '123456') {
            alert('Đăng nhập thành công!');
            window.location.href ='dashboard.html' // Chuyển sang trang menu
        } else {
            alert('Tên đăng nhập hoặc mật khẩu sai!');
        }
    });
</script>
</html>
